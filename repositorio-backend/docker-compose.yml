# Levantar: docker compose up -d --build
# DB_HOST=mysql solo es válido dentro del contenedor api; en el host usa 127.0.0.1.
#
# Sin "condition: service_healthy", Express arranca antes que MySQL → ECONNREFUSED.

services:
  mysql:
    image: mysql:8.4
    container_name: repositorio-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mysqlrootkey}
      MYSQL_DATABASE: ${DB_NAME:-repositorio}
      MYSQL_ROOT_HOST: '%'
      TZ: UTC
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./database/docker/03-remote-access.sh:/docker-entrypoint-initdb.d/03-remote-access.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
  phpmyadmin:
    container_name: repositorio_pma
    image: phpmyadmin:5.2.0-apache
    platform: linux/amd64
    ports:
    - 8080:80
    environment:
        PMA_HOST: mysql
        PMA_PORT: 3306
        PMA_USER: root
        PMA_PASSWORD: ${DB_PASSWORD:-mysqlrootkey}
        MEMORY_LIMIT: -1
        UPLOAD_LIMIT: 4096M
    depends_on:
    - mysql
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repositorio-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-mysqlrootkey}
      DB_NAME: ${DB_NAME:-repositorio}
      # Sustitución desde el `.env` del proyecto Compose o del shell del host
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  api_node_modules:
